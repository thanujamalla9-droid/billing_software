<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Items</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="form-panel" aria-labelledby="formTitle">
            <div class="panel-heading">
                <p class="eyebrow">Billing Software</p>
                <h1 id="formTitle">Item Details</h1>
            </div>

            <form id="itemForm" autocomplete="off">
                <input type="hidden" id="itemId">

                <label for="code">Code</label>
                <input id="code" name="code" type="text" placeholder="Example: P001" required>

                <label for="item">Item</label>
                <input id="item" name="item" type="text" placeholder="Example: Notebook" required>

                <label for="price">Price</label>
                <input id="price" name="price" type="number" min="0" step="0.01" placeholder="Example: 120.00" required>

                <div class="form-actions">
                    <button type="submit" id="submitBtn">Add Item</button>
                    <button type="button" id="cancelBtn" class="secondary" hidden>Cancel</button>
                </div>
            </form>

            <p id="message" class="message" role="status"></p>
        </section>

        <section class="table-panel" aria-labelledby="tableTitle">
            <div class="table-header">
                <div>
                    <p class="eyebrow">Records</p>
                    <h2 id="tableTitle">Saved Items</h2>
                </div>
                <button type="button" id="refreshBtn" class="secondary">Refresh</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemsTable">
                        <tr>
                            <td colspan="4" class="empty">Loading items...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
